name: windows-exe

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "pyproject.toml"
      - "DockFlow.spec"
      - ".github/workflows/windows-exe.yml"
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pyinstaller
      - name: Build executable
        run: pyinstaller --clean --noconfirm DockFlow.spec
      - name: Smoke test executable
        shell: pwsh
        run: |
          .\dist\DockFlow.exe --help | Out-File -FilePath help.txt -Encoding utf8
          if (-not (Select-String -Path help.txt -Pattern "wizard" -Quiet)) { throw "DockFlow help smoke test failed" }
      - name: Write package notes
        shell: pwsh
        run: |
          @"
          DockFlow Windows preview

          Double-click DockFlow.exe to start the interactive project wizard.
          AutoDock Vina, Open Babel, and MGLTools/AutoDockTools are external dependencies in this preview build.
          The wizard creates independent projects under Documents\DockFlow\runs by default.
          "@ | Set-Content -Path dist\README-WINDOWS.txt -Encoding utf8
      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: DockFlow-Windows-x64
          path: |
            dist/DockFlow.exe
            dist/README-WINDOWS.txt
          if-no-files-found: error
          retention-days: 30
