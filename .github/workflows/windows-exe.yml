name: windows-exe

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "DockFlow.spec"
      - ".github/workflows/windows-exe.yml"
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui]" pyinstaller
      - name: Smoke test GUI source
        run: python -m dockflow.gui_launcher --gui-smoke-test
      - name: Build executables
        run: pyinstaller --clean --noconfirm DockFlow.spec
      - name: Smoke test CLI executable
        shell: pwsh
        run: |
          $output = .\dist\DockFlow-CLI.exe --smoke-test
          if ($LASTEXITCODE -ne 0) { throw "DockFlow CLI returned $LASTEXITCODE" }
          if ($output -notmatch "DockFlow executable OK") { throw "DockFlow CLI smoke test failed" }
      - name: Smoke test desktop GUI
        shell: pwsh
        run: |
          Remove-Item "$env:TEMP\DockFlow-gui-error.txt" -ErrorAction SilentlyContinue
          $process = Start-Process -FilePath ".\dist\DockFlow.exe" -ArgumentList "--gui-smoke-test" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            if (Test-Path "$env:TEMP\DockFlow-gui-error.txt") { Get-Content "$env:TEMP\DockFlow-gui-error.txt" }
            throw "DockFlow GUI returned $($process.ExitCode)"
          }
      - name: Write package notes
        shell: pwsh
        run: |
          @"
          DockFlow Molecular Docking Studio 1.4.1

          Double-click DockFlow.exe to open the graphical desktop interface.
          DockFlow-CLI.exe retains command-line and automation support.

          External tools:
          - AutoDockTools: required for receptor and ligand PDBQT generation.
          - AutoDock Vina: required for docking.
          - Open Babel: required only for SDF/MOL format conversion and PLIP pose conversion.
          - PLIP: optional interaction analysis.

          Use Tool Settings > Select AutoDockTools installation directory to detect AutoDockTools Python,
          prepare_receptor4.py, and prepare_ligand4.py automatically. Tool paths are saved into the active project.

          Projects are stored under Documents\DockFlow\runs by default.
          "@ | Set-Content -Path dist\README-WINDOWS.txt -Encoding utf8
      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: DockFlow-1.4.1-Windows-x64
          path: |
            dist/DockFlow.exe
            dist/DockFlow-CLI.exe
            dist/README-WINDOWS.txt
          if-no-files-found: error
          retention-days: 30
